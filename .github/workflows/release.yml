name: Release

on:
  push:
    branches: [main, v3]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "1"

jobs:
  verify:
    name: Verify release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v3'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run release checks
        run: pnpm check:release

  changesets:
    name: Version packages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v3'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has-changesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Create or update version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          title: Version packages
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish packages
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v3') && needs.changesets.outputs.has-changesets == 'false'
    needs: [verify, changesets]
    runs-on: ubuntu-latest
    # The npm-publish environment still gates this job (branch restriction plus
    # any required reviewers); it no longer holds an NPM_TOKEN. Auth is via npm
    # trusted publishing (OIDC), so a matching trusted publisher must be
    # configured for each package on npmjs.com (workflow: release.yml).
    environment: npm-publish
    permissions:
      # contents: write lets the job push version tags and create GitHub
      # releases; id-token: write mints the OIDC token npm exchanges for a
      # short-lived publish credential (trusted publishing) and provenance.
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: pnpm build

      - name: Publish changed public packages
        # No NODE_AUTH_TOKEN: pnpm (>= 11.5) obtains a short-lived credential via
        # OIDC trusted publishing. GITHUB_TOKEN is only for pushing tags and
        # creating GitHub releases in the publish script.
        run: pnpm changeset:publish --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
