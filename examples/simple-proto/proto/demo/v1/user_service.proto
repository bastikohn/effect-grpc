syntax = "proto3";

package demo.v1;

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc WatchUsers(WatchUsersRequest) returns (stream UserEvent);
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message WatchUsersRequest {
  string tenant_id = 1;
  int32 count = 2;
}

message User {
  string id = 1;
  string name = 2;
}

message UserEvent {
  string id = 1;
  string name = 2;
  string action = 3;
  int32 sequence = 4;
}
